name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Bruinen.sln

      - name: Build
        run: dotnet build Bruinen.sln --no-restore --configuration Release

      - name: Run unit tests
        run: >
          dotnet test tests/Bruinen.UnitTests/Bruinen.UnitTests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory ./TestResults

      - name: Run integration tests
        run: >
          dotnet test tests/Bruinen.IntegrationTests/Bruinen.IntegrationTests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=integration-tests.trx"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/*.trx

